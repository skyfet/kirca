name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'flutter_app/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.0'
          cache: true

      - run: flutter pub get

      # Release build falls back to debug signing per android/app/build.gradle.kts -
      # OK for sideloading, not for Play Store.
      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=KIRCA_API_BASE="https://kirca-api.archen.workers.dev" \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kirca-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: kirca-apk
          path: flutter_app/build/app/outputs/flutter-apk/kirca-*.apk
          if-no-files-found: error

      # Publish to a GitHub Release so the APK gets a public download URL
      # (artifacts above require a logged-in GitHub user to download).
      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="apk-${{ github.run_number }}"
          gh release create "$TAG" \
            --title "Android APK build ${{ github.run_number }}" \
            --notes "Branch: ${{ github.ref_name }} @ ${{ github.sha }}\n\nDebug-signed APK for sideloading. Install with: adb install kirca-${{ github.run_number }}.apk" \
            build/app/outputs/flutter-apk/kirca-${{ github.run_number }}.apk
          echo "Download: https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
