# Codemagic CI/CD — Flutter iOS → unsigned IPA → GitHub Releases → Scarlet
#
# What it does:
# 1. Generates ios/android folders (not committed)
# 2. Patches bundle id to ai.kirca.app
# 3. Builds release IPA WITHOUT signing (--no-codesign)
# 4. Packages it as IPA
# 5. Generates Scarlet source.json
# 6. Codemagic creates a GitHub Release tagged build-N with both files attached
#
# No Apple Developer / App Store Connect required.
# Testers install via Scarlet by subscribing to the repo source.
#
# === Setup before the first run ===
#
# 1. Codemagic → App settings → Build configuration → switch to "codemagic.yaml".
#
# 2. Codemagic → User settings → Integrations → GitHub: must be connected
#    (usually connected automatically when the repo is added via OAuth).
#    If not, add a PAT with `repo` scope as env var GITHUB_TOKEN.
#
# 3. Push to main → build → new release `build-N` at github.com/skyfet/kirca/releases
#    Testers add the Scarlet source:
#       https://github.com/skyfet/kirca/releases/latest/download/scarlet-source.json

workflows:
  ios-scarlet:
    name: iOS unsigned → GH Releases (Scarlet)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - github
      vars:
        BUNDLE_ID: "ai.kirca.app"
        GH_REPO: "skyfet/kirca"
        KIRCA_API_BASE: "https://kirca-api.gdetemka.workers.dev"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    working_directory: flutter_app

    scripts:
      - name: Generate platform folders
        script: flutter create --org ai.kirca --platforms=ios,android .

      - name: Patch bundle id to ai.kirca.app
        script: |
          set -e
          PBX=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = ai\.kirca\.kirca;/PRODUCT_BUNDLE_IDENTIFIER = ai.kirca.app;/g' "$PBX"
          grep -q "PRODUCT_BUNDLE_IDENTIFIER = ai.kirca.app;" "$PBX"

      - name: Apply iOS patches (AppDelegate + entitlements)
        script: |
          set -e
          # AppDelegate.swift registers the kirca/apns MethodChannel and handles APNs callbacks.
          cp ios_patches/AppDelegate.swift ios/Runner/AppDelegate.swift
          # Entitlements: aps-environment=production. Scarlet / non-Apple-Dev may not deliver
          # real push reliably — known risk, fallback documented in DEPLOY.md.
          cp ios_patches/Runner.entitlements ios/Runner/Runner.entitlements
          # Wire entitlements into the Xcode project if not already attached.
          PBX=ios/Runner.xcodeproj/project.pbxproj
          if ! grep -q 'CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements' "$PBX"; then
            # Inject CODE_SIGN_ENTITLEMENTS after each PRODUCT_BUNDLE_IDENTIFIER line in the Runner target.
            # perl handles \n and \t escapes portably, so we avoid embedding literal tabs in this YAML.
            perl -i -pe 's|(PRODUCT_BUNDLE_IDENTIFIER = ai\.kirca\.app;)|$1\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;|g' "$PBX"
          fi

      - name: Flutter pub get
        script: flutter pub get

      - name: Build unsigned iOS release
        script: |
          flutter build ios --release --no-codesign \
            --build-name="1.0.${BUILD_NUMBER}" \
            --build-number="${BUILD_NUMBER}" \
            --dart-define=KIRCA_API_BASE="${KIRCA_API_BASE}"

      - name: Package IPA
        script: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload kirca.ipa
          mkdir Payload
          cp -R Runner.app Payload/
          zip -qry ../../../kirca.ipa Payload
          cd ../../..
          ls -lh kirca.ipa

      - name: Generate Scarlet source.json
        script: |
          set -e
          IPA_PATH=kirca.ipa
          VERSION="1.0.${BUILD_NUMBER}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SIZE=$(stat -f%z "$IPA_PATH")
          BASE="https://github.com/${GH_REPO}/releases/latest/download"
          cat > scarlet-source.json <<JSON
          {
            "META": {
              "repoName": "kirca",
              "repoIcon": "${BASE}/icon.png"
            },
            "Tweaks": [],
            "Apps": [
              {
                "name": "kirca",
                "version": "${VERSION}",
                "bundleID": "${BUNDLE_ID}",
                "down": "${BASE}/kirca.ipa",
                "category": "Social Networking",
                "iconURL": "${BASE}/icon.png",
                "description": "Simple chat. Build ${BUILD_NUMBER} (${DATE}).",
                "developer": "skyfet",
                "screenshots": [],
                "appstore": false
              }
            ]
          }
          JSON
          cat scarlet-source.json

    artifacts:
      - flutter_app/kirca.ipa
      - flutter_app/scarlet-source.json

    publishing:
      scripts:
        - name: Publish to GitHub Releases
          script: |
            set -e
            # Requires GITHUB_TOKEN env var (PAT with `repo` scope) configured
            # in Codemagic. Codemagic does not have a native github_releases
            # publishing target, so we use the `gh` CLI here.
            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is not set; cannot publish release" >&2
              exit 1
            fi
            TAG="build-${BUILD_NUMBER}"
            gh release create "${TAG}" \
              --repo "${GH_REPO}" \
              --target "${CM_COMMIT}" \
              --title "Build ${BUILD_NUMBER}" \
              --notes "Automated build ${BUILD_NUMBER}" \
              kirca.ipa scarlet-source.json
