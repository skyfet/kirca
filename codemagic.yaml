# Codemagic CI/CD — Flutter iOS → unsigned IPA → GitHub Releases → Scarlet
#
# Что делает:
# 1. Генерит ios/android папки (не коммитим)
# 2. Патчит bundle id на ai.kirca.app
# 3. Собирает release IPA БЕЗ подписи (--no-codesign)
# 4. Пакует в IPA
# 5. Генерит Scarlet source.json
# 6. Codemagic создаёт GitHub Release с тэгом build-N, прикладывает оба файла
#
# Никакого Apple Developer / App Store Connect не нужно.
# Тестеры ставят через Scarlet, подписавшись на репу.
#
# === Setup перед первым запуском ===
#
# 1. Codemagic → App settings → Build configuration → переключи на "codemagic.yaml".
#
# 2. Codemagic → User settings → Integrations → GitHub: должен быть подключён
#    (обычно подключается автоматом при connect repo через OAuth).
#    Если нет — добавь PAT с правом `repo` как env var GITHUB_TOKEN.
#
# 3. Push в main → билд → новый release `build-N` на github.com/skyfet/kirca/releases
#    Тестеры добавляют в Scarlet репу:
#       https://github.com/skyfet/kirca/releases/latest/download/scarlet-source.json

workflows:
  ios-scarlet:
    name: iOS unsigned → GH Releases (Scarlet)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "ai.kirca.app"
        GH_REPO: "skyfet/kirca"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    working_directory: flutter_app

    scripts:
      - name: Generate platform folders
        script: flutter create --org ai.kirca --platforms=ios,android .

      - name: Patch bundle id to ai.kirca.app
        script: |
          set -e
          PBX=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = ai\.kirca\.kirca;/PRODUCT_BUNDLE_IDENTIFIER = ai.kirca.app;/g' "$PBX"
          grep -q "PRODUCT_BUNDLE_IDENTIFIER = ai.kirca.app;" "$PBX"

      - name: Flutter pub get
        script: flutter pub get

      - name: Build unsigned iOS release
        script: |
          flutter build ios --release --no-codesign \
            --build-name="1.0.${BUILD_NUMBER}" \
            --build-number="${BUILD_NUMBER}"

      - name: Package IPA
        script: |
          set -e
          cd build/ios/iphoneos
          rm -rf Payload kirca.ipa
          mkdir Payload
          cp -R Runner.app Payload/
          zip -qry ../../../kirca.ipa Payload
          cd ../../..
          ls -lh kirca.ipa

      - name: Generate Scarlet source.json
        script: |
          set -e
          IPA_PATH=kirca.ipa
          VERSION="1.0.${BUILD_NUMBER}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SIZE=$(stat -f%z "$IPA_PATH")
          BASE="https://github.com/${GH_REPO}/releases/latest/download"
          cat > scarlet-source.json <<JSON
          {
            "META": {
              "repoName": "kirca",
              "repoIcon": "${BASE}/icon.png"
            },
            "Tweaks": [],
            "Apps": [
              {
                "name": "kirca",
                "version": "${VERSION}",
                "bundleID": "${BUNDLE_ID}",
                "down": "${BASE}/kirca.ipa",
                "category": "Social Networking",
                "iconURL": "${BASE}/icon.png",
                "description": "Simple chat. Build ${BUILD_NUMBER} (${DATE}).",
                "developer": "skyfet",
                "screenshots": [],
                "appstore": false
              }
            ]
          }
          JSON
          cat scarlet-source.json

    artifacts:
      - flutter_app/kirca.ipa
      - flutter_app/scarlet-source.json

    publishing:
      github_releases:
        prerelease: false
        artifact_patterns:
          - flutter_app/kirca.ipa
          - flutter_app/scarlet-source.json
