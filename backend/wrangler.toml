name = "kirca-api"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret APNs config. The secret (APNS_KEY) is set via `wrangler secret put APNS_KEY`.
# If these values are empty, push notifications are silently disabled.
# R2_PUBLIC_BASE — public URL prefix for the attachments bucket (r2.dev or custom domain),
# no trailing slash. Empty means uploads are still allowed but URLs are returned as null
# and the client must use /attachments/:id via the worker (authenticated).
[vars]
APNS_TEAM_ID = ""
APNS_KEY_ID = ""
APNS_BUNDLE_ID = "ai.kirca.app"
APNS_HOST = "api.push.apple.com"
R2_PUBLIC_BASE = ""

[[d1_databases]]
binding = "DB"
database_name = "kirca-api"
database_id = "b5ddc653-b440-4cf2-94a4-61d1f6ef3be3"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Attachments bucket. Create with: `wrangler r2 bucket create kirca-attachments`.
# Commented until the bucket exists — uploads are gated behind ATTACHMENTS binding presence.
# [[r2_buckets]]
# binding = "ATTACHMENTS"
# bucket_name = "kirca-attachments"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# Daily sweep: expired sessions, old rate_limits, old invites.
[triggers]
crons = ["0 3 * * *"]

# ---------------- staging ----------------
# Separate worker for risky changes. Deployed by backend-staging.yml on push to the `dev` branch.
# Before the first deploy: run `wrangler d1 create kirca-api-staging` and paste the database_id below.
[env.staging]
name = "kirca-api-staging"

[env.staging.vars]
APNS_TEAM_ID = ""
APNS_KEY_ID = ""
APNS_BUNDLE_ID = "ai.kirca.app"
APNS_HOST = "api.sandbox.push.apple.com"
R2_PUBLIC_BASE = ""

[[env.staging.d1_databases]]
binding = "DB"
database_name = "kirca-api-staging"
database_id = "REPLACE_ME"

[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
