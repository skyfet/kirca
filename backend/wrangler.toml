name = "kirca-api"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# Non-secret APNs config. The secret (APNS_KEY) is set via `wrangler secret put APNS_KEY`.
# If these values are empty, push notifications are silently disabled.
[vars]
APNS_TEAM_ID = ""
APNS_KEY_ID = ""
APNS_BUNDLE_ID = "ai.kirca.app"
APNS_HOST = "api.push.apple.com"

[[d1_databases]]
binding = "DB"
database_name = "kirca-api"
database_id = "b5ddc653-b440-4cf2-94a4-61d1f6ef3be3"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Attachments (images, avatars) are stored as BLOBs in D1 — R2 is not used.
# Client must compress before upload (see flutter_app/lib/screens/chat.dart);
# server enforces hard size limits in src/lib/r2.ts.

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

# Daily sweep: expired sessions, old rate_limits, old invites.
[triggers]
crons = ["0 3 * * *"]

# ---------------- staging ----------------
# Separate worker for risky changes. Deployed by backend-staging.yml on push to the `dev` branch.
# Before the first deploy: run `wrangler d1 create kirca-api-staging` and paste the database_id below.
[env.staging]
name = "kirca-api-staging"

[env.staging.vars]
APNS_TEAM_ID = ""
APNS_KEY_ID = ""
APNS_BUNDLE_ID = "ai.kirca.app"
APNS_HOST = "api.sandbox.push.apple.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "kirca-api-staging"
database_id = "REPLACE_ME"

[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
